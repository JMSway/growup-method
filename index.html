<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Метод Grow Up</title>
  <link rel="icon" type="image/png" href="assets/images/favicon/favicon.png">
  <link rel="apple-touch-icon" href="assets/images/favicon/favicon.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/icons.css">
</head>
<body>

  <!-- ====== HERO (СЕКЦИЯ 1) ====== -->
  <section class="hero" id="hero">

    <!-- Theme Toggle -->
    <button class="theme-toggle" aria-label="Переключить тему">
      <iconify-icon icon="lucide:sun" class="icon-toggle-dark"></iconify-icon>
      <iconify-icon icon="lucide:moon" class="icon-toggle-light"></iconify-icon>
    </button>

    <!-- 1. ЗАГОЛОВОК (центр) -->
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="title-accent">Как языковой школе</span><br>
        <span class="title-sub">выйти на стабильные 5&nbsp;000&nbsp;000&nbsp;₸</span>
      </h1>
      <p class="hero-subtitle">
        и закрывать каждого второго после пробного урока
        с помощью системы «Grow&nbsp;Up»
      </p>
    </div>

    <!-- 2. ВИЗУАЛ (flex: 1) -->
    <div class="hero-visual">
      <div class="hero-glow"></div>
      <img src="assets/images/mainPage1/main2-clouds-back.png"
           alt="" class="layer clouds-back" loading="eager">
      <img src="assets/images/mainPage1/main2-clouds-back.png"
           alt="" class="layer clouds-left" loading="eager">
      <img src="assets/images/mainPage1/main1-suitcase.png"
           alt="Чемодан с достопримечательностями мира" class="layer suitcase" loading="eager">
      <img src="assets/images/mainPage1/main2-clouds.png"
           alt="" class="layer clouds" loading="eager">
      <img src="assets/images/mainPage1/main3-plane.png"
           alt="" class="layer plane" loading="eager">
      <img src="assets/images/mainPage1/main4-badge.png"
           alt="5 000 000 ₸" class="layer badge" loading="eager">
    </div>

    <!-- 3. НИЖНИЙ БЛОК -->
    <div class="hero-bottom">
      <ul class="hero-bullets">
        <li class="bullet-success">
          <iconify-icon icon="lucide:check" class="icon-accent"></iconify-icon>
          <span>Без акций и скидок</span>
        </li>
        <li class="bullet-success">
          <iconify-icon icon="lucide:check" class="icon-accent"></iconify-icon>
          <span>Ежедневно от 5+ новых учеников на пробный</span>
        </li>
        <li class="bullet-success">
          <iconify-icon icon="lucide:check" class="icon-accent"></iconify-icon>
          <span>Каждый 2-й после пробного покупает абонемент</span>
        </li>
      </ul>
      <p class="hero-highlight">Всего за 30 дней</p>
      <p class="hero-next">Как работает система?</p>
      <div class="scroll-indicator">
        <iconify-icon icon="lucide:chevron-down"></iconify-icon>
      </div>
    </div>

  </section>

  <!-- Iconify CDN -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</body>
</html>
